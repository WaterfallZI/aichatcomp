<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — AI Chat Company</title>
<link rel="icon" type="image/svg+xml" href="/icon.svg">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="grid-bg"></div>
<div class="noise-overlay"></div>
<div class="glow-orb glow-orb-1"></div>
<div class="glow-orb glow-orb-2"></div>

<header class="header" id="header">
  <div class="header-inner">
    <a href="/" class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <span class="logo-text">AI Chat Co.</span>
    </a>
    <nav class="nav">
      <a href="/" class="nav-link">Home</a>
      <a href="/features.html" class="nav-link">Features</a>
    </nav>
  </div>
</header>

<main class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" width="22" height="22">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <span class="login-logo-text">AI Chat Co.</span>
    </div>

    <div id="login-alert" style="display:none; margin-bottom:16px;"></div>

    <!-- Tabs -->
    <div class="login-tabs" role="tablist">
      <button class="login-tab active" id="tab-signin" onclick="switchTab('signin')">Sign in</button>
      <button class="login-tab" id="tab-register" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Sign In -->
    <form id="signin-form" class="login-form" onsubmit="handleSignin(event)" novalidate>
      <div class="login-title">Welcome back</div>
      <p class="login-subtitle">Sign in to your account</p>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="si-email" placeholder="you@example.com" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="si-password" placeholder="Your password" autocomplete="current-password" required>
      </div>
      <!-- Danya Captcha -->
      <div class="form-group" id="si-captcha-wrap">
        <label class="form-label" style="display:flex;align-items:center;gap:6px">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          Danya Captcha — <span id="si-captcha-q" style="color:var(--c);font-weight:800"></span>
        </label>
        <input class="form-input" type="number" id="si-captcha-a" placeholder="Answer">
      </div>
      <button type="submit" class="login-submit-btn" id="si-btn">Sign in</button>
      <p class="login-footer">Don't have an account? <a href="#" onclick="switchTab('register');return false">Register</a></p>
    </form>

    <!-- Register -->
    <form id="register-form" class="login-form" style="display:none" onsubmit="handleRegister(event)" novalidate>
      <div class="login-title">Create account</div>
      <p class="login-subtitle">Get 350 free credits on signup</p>
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" type="text" id="reg-username" placeholder="Your name" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="reg-email" placeholder="you@example.com" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="reg-password" placeholder="Min 6 characters" autocomplete="new-password" required>
      </div>
      <!-- Danya Captcha -->
      <div class="form-group" id="reg-captcha-wrap">
        <label class="form-label" style="display:flex;align-items:center;gap:6px">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          Danya Captcha — <span id="reg-captcha-q" style="color:var(--c);font-weight:800"></span>
        </label>
        <input class="form-input" type="number" id="reg-captcha-a" placeholder="Answer">
      </div>
      <button type="submit" class="login-submit-btn" id="reg-btn">Create account</button>
      <div class="login-credits-note">🎁 <strong>350 free credits</strong> on signup</div>
      <p class="login-footer">Already have an account? <a href="#" onclick="switchTab('signin');return false">Sign in</a></p>
    </form>
  </div>
</main>

<script>
'use strict';

// ── Captcha ────────────────────────────────────────────────────────────
const captchas = {};

function genCaptcha(prefix) {
  const a = Math.floor(Math.random() * 12) + 1;
  const b = Math.floor(Math.random() * 12) + 1;
  const ops = ['+', '-', '×'];
  const op = ops[Math.floor(Math.random() * ops.length)];
  const ans = op === '+' ? a + b : op === '-' ? a - b : a * b;
  captchas[prefix] = ans;
  document.getElementById(prefix + '-captcha-q').textContent = `${a} ${op} ${b} = ?`;
}

function checkCaptcha(prefix) {
  const val = parseInt(document.getElementById(prefix + '-captcha-a').value);
  if (val === captchas[prefix]) return true;
  showAlert('Wrong captcha answer. Try again.', 'error');
  genCaptcha(prefix);
  document.getElementById(prefix + '-captcha-a').value = '';
  return false;
}

// ── Tabs ───────────────────────────────────────────────────────────────
function switchTab(tab) {
  clearAlert();
  document.getElementById('signin-form').style.display = tab === 'signin' ? 'flex' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? 'flex' : 'none';
  document.getElementById('tab-signin').classList.toggle('active', tab === 'signin');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
}

// ── Alert ──────────────────────────────────────────────────────────────
function showAlert(msg, type = 'error') {
  const el = document.getElementById('login-alert');
  el.className = 'login-alert ' + type;
  el.textContent = (type === 'error' ? '⚠️ ' : '✅ ') + msg;
  el.style.display = 'flex';
}
function clearAlert() {
  document.getElementById('login-alert').style.display = 'none';
}

// ── Sign In ────────────────────────────────────────────────────────────
async function handleSignin(e) {
  e.preventDefault();
  clearAlert();
  if (!checkCaptcha('si')) return;

  const email = document.getElementById('si-email').value.trim();
  const password = document.getElementById('si-password').value;
  if (!email || !password) { showAlert('Fill in all fields'); return; }

  const btn = document.getElementById('si-btn');
  btn.disabled = true; btn.textContent = 'Signing in...';

  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const d = await r.json();
    if (r.ok) {
      showAlert('Signed in! Redirecting...', 'success');
      setTimeout(() => location.href = '/chat.html', 700);
    } else {
      showAlert(d.error || 'Invalid email or password');
      genCaptcha('si');
      document.getElementById('si-captcha-a').value = '';
    }
  } catch { showAlert('Network error. Try again.'); }
  finally { btn.disabled = false; btn.textContent = 'Sign in'; }
}

// ── Register ───────────────────────────────────────────────────────────
async function handleRegister(e) {
  e.preventDefault();
  clearAlert();
  if (!checkCaptcha('reg')) return;

  const username = document.getElementById('reg-username').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  if (!username || !email || !password) { showAlert('Fill in all fields'); return; }
  if (password.length < 6) { showAlert('Password must be at least 6 characters'); return; }

  const btn = document.getElementById('reg-btn');
  btn.disabled = true; btn.textContent = 'Creating...';

  try {
    const r = await fetch('/api/auth/register', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, email, password })
    });
    const d = await r.json();
    if (r.ok) {
      showAlert('Account created! Redirecting...', 'success');
      setTimeout(() => location.href = '/chat.html', 700);
    } else {
      showAlert(d.error || 'Registration failed');
      genCaptcha('reg');
      document.getElementById('reg-captcha-a').value = '';
    }
  } catch { showAlert('Network error. Try again.'); }
  finally { btn.disabled = false; btn.textContent = 'Create account'; }
}

// ── Init ───────────────────────────────────────────────────────────────
window.addEventListener('scroll', () => {
  document.getElementById('header')?.classList.toggle('scrolled', window.scrollY > 10);
});

genCaptcha('si');
genCaptcha('reg');

// Redirect if already logged in
(async () => {
  try {
    const r = await fetch('/api/auth/me', { credentials: 'include' });
    if (r.ok) location.href = '/chat.html';
  } catch {}
})();
</script>
</body>
</html>
